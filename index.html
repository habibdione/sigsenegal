            highlightLayer = e.target;

                color: 'rgba(255, 255, 0, 1.00)',
              });
            } else {
              highlightLayer.setStyle({

                fillOpacity: 1
              });
            }
            highlightLayer.openPopup();

        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2"><strong>Code</strong><br />' + (feature.properties['Code'] !== null ? autolinker.link(String(feature.properties['Code']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\

                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
            layer.bindPopup(content, { maxBlockSize: 400 });
        }

              addLabel(layer, i);
              i++;
        });
        map.addControl(new L.Control.Search({
            layer: cluster_localites_5,
            initial: false,
            hideMarkerOnCollapse: true,
            propertyName: 'NOM'}));
        if (typeof url === 'undefined') {
            document.getElementsByClassName('search-button')[0].className += ' fa fa-binoculars';
        } else {
            document.getElementsByClassName('search-button')[1].className += ' fa fa-binoculars';
        }
        resetLabels([layer_Region_1,layer_localites_5]);
        map.on("zoomend", function(){
            resetLabels([layer_Region_1,layer_localites_5]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_Region_1,layer_localites_5]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_Region_1,layer_localites_5]);
        });
        
        // ========== Custom Controls ==========
        // Layer Visibility Controls
        document.getElementById('chk-region').addEventListener('change', function() {
            if (this.checked) {
                map.addLayer(layer_Region_1);
            } else {
                map.removeLayer(layer_Region_1);
            }
        });
        
        document.getElementById('chk-departement').addEventListener('change', function() {
            if (this.checked) {
                map.addLayer(layer_Departement_2);
            } else {
                map.removeLayer(layer_Departement_2);
            }
        });
        
        document.getElementById('chk-arrondissement').addEventListener('change', function() {
            if (this.checked) {
                map.addLayer(layer_Arrondissement_3);
            } else {
                map.removeLayer(layer_Arrondissement_3);
            }
        });
        
        document.getElementById('chk-localites').addEventListener('change', function() {
            if (this.checked) {
                cluster_localites_5.addTo(map);
            } else {
                map.removeLayer(cluster_localites_5);
            }
        });
        
        document.getElementById('chk-routes').addEventListener('change', function() {
            if (this.checked) {
                map.addLayer(layer_Routes_4);
            } else {
                map.removeLayer(layer_Routes_4);
            }
        });
        
        // Basemap Controls
        document.getElementById('bm-osm').addEventListener('change', function() {
            if (this.checked) {
                map.removeLayer(layer_Satellite);
                map.removeLayer(layer_Terrain);
                map.addLayer(layer_OpenStreetMap_0);
            }
        });
        
        document.getElementById('bm-satellite').addEventListener('change', function() {
            if (this.checked) {
                map.removeLayer(layer_OpenStreetMap_0);
                map.removeLayer(layer_Terrain);
                map.addLayer(layer_Satellite);
            }
        });
        
        document.getElementById('bm-terrain').addEventListener('change', function() {
            if (this.checked) {
                map.removeLayer(layer_OpenStreetMap_0);
                map.removeLayer(layer_Satellite);
                map.addLayer(layer_Terrain);
            }
        });
        </script>
    </body>
</html>
